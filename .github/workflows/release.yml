name: Publish to PyPI and GitHub Release

on:
  push:
    tags:
      - '[0-9]*' # Triggers on tags starting with a number (e.g., 2023.10)

jobs:
  release:
    name: Build, Publish, and Release
    runs-on: ubuntu-latest
    
    environment:
      name: pypi
      url: https://pypi.org/p/batconcalc

    permissions:
      id-token: write
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # (Optional but recommended) Keeps your workflow dynamic
    - name: Get version from pyproject.toml
      id: get_version
      run: |
        # If your version is hardcoded in pyproject.toml:
        PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: pip install build

    - name: Build package
      run: python -m build

    # PyPI Trusted Publishing
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    # Create GitHub Release
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # Uses the exact tag name pushed (e.g., 'Release 2023.10')
        name: "Release ${{ github.ref_name }}" 
        files: dist/*
        generate_release_notes: true